spring:
  datasource:
    url: jdbc:h2:mem:mtprototest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  startup:
    bootstrap-enabled: false
  parser:
    initial-delay-ms: 3600000
    fixed-delay-ms: 3600000
  checker:
    initial-delay-ms: 3600000
    fixed-delay-ms: 3600000
    deep-probe-limit: 5
    batch-size: 50
  rate-limit:
    enabled: true
    public-read-limit: 2
    public-read-window-ms: 60000
    feedback-write-limit: 1
    feedback-write-window-ms: 60000
  sources:
    entries:
      - name: test_source
        url: https://example.invalid/proxies.txt
        format: TELEGRAM_TEXT
        enabled: false

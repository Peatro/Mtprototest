spring:
  application:
    name: Mtprototest

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mtproto_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:always}

springdoc:
  swagger-ui:
    path: /docs
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}

app:
  startup:
    bootstrap-enabled: ${APP_STARTUP_BOOTSTRAP_ENABLED:true}
    check-batch-size: ${APP_STARTUP_CHECK_BATCH_SIZE:120}
    deep-probe-limit: ${APP_STARTUP_DEEP_PROBE_LIMIT:10}

  parser:
    initial-delay-ms: ${APP_PARSER_INITIAL_DELAY_MS:43200000}
    fixed-delay-ms: ${APP_PARSER_FIXED_DELAY_MS:43200000}

  checker:
    initial-delay-ms: ${APP_CHECKER_INITIAL_DELAY_MS:300000}
    fixed-delay-ms: ${APP_CHECKER_FIXED_DELAY_MS:300000}
    batch-size: ${APP_CHECKER_BATCH_SIZE:200}
    deep-probe-limit: ${APP_CHECKER_DEEP_PROBE_LIMIT:20}
    alive-quick-ok-recheck-after-ms: ${APP_CHECKER_ALIVE_QUICK_OK_RECHECK_AFTER_MS:300000}
    alive-verified-recheck-after-ms: ${APP_CHECKER_ALIVE_VERIFIED_RECHECK_AFTER_MS:1800000}
    dead-retry-after-ms: ${APP_CHECKER_DEAD_RETRY_AFTER_MS:21600000}
    executor:
      core-pool-size: ${APP_CHECKER_EXECUTOR_CORE_POOL_SIZE:16}
      max-pool-size: ${APP_CHECKER_EXECUTOR_MAX_POOL_SIZE:32}
      queue-capacity: ${APP_CHECKER_EXECUTOR_QUEUE_CAPACITY:200}
      effective-concurrency: ${APP_CHECKER_EXECUTOR_EFFECTIVE_CONCURRENCY:24}
      submission-window-size: ${APP_CHECKER_EXECUTOR_SUBMISSION_WINDOW_SIZE:24}
      await-termination-seconds: ${APP_CHECKER_EXECUTOR_AWAIT_TERMINATION_SECONDS:30}
      thread-name-prefix: ${APP_CHECKER_EXECUTOR_THREAD_NAME_PREFIX:proxy-checker-}

  feedback:
    dedupe-window-minutes: ${APP_FEEDBACK_DEDUPE_WINDOW_MINUTES:60}
    recent-limit: ${APP_FEEDBACK_RECENT_LIMIT:20}
    max-submissions-per-window: ${APP_FEEDBACK_MAX_SUBMISSIONS_PER_WINDOW:10}
    anonymous-max-submissions-per-window: ${APP_FEEDBACK_ANONYMOUS_MAX_SUBMISSIONS_PER_WINDOW:3}

  admin:
    enabled: ${APP_ADMIN_ENABLED:false}
    header-name: ${APP_ADMIN_HEADER_NAME:X-Admin-Key}
    key: ${APP_ADMIN_KEY:}

  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    public-read-limit: ${APP_RATE_LIMIT_PUBLIC_READ_LIMIT:120}
    public-read-window-ms: ${APP_RATE_LIMIT_PUBLIC_READ_WINDOW_MS:60000}
    feedback-write-limit: ${APP_RATE_LIMIT_FEEDBACK_WRITE_LIMIT:20}
    feedback-write-window-ms: ${APP_RATE_LIMIT_FEEDBACK_WRITE_WINDOW_MS:60000}

  analytics:
    posthog:
      enabled: ${APP_ANALYTICS_POSTHOG_ENABLED:false}
      api-key: ${APP_ANALYTICS_POSTHOG_API_KEY:}
      host: ${APP_ANALYTICS_POSTHOG_HOST:https://us.i.posthog.com}

proxy:
  ranking:
    session-blacklist:
      enabled: ${PROXY_RANKING_SESSION_BLACKLIST_ENABLED:true}
      window-minutes: ${PROXY_RANKING_SESSION_BLACKLIST_WINDOW_MINUTES:30}
      max-history-per-session: ${PROXY_RANKING_SESSION_BLACKLIST_MAX_HISTORY:100}
      record-top-n: ${PROXY_RANKING_SESSION_BLACKLIST_RECORD_TOP_N:5}
    segment-overrides:
      enabled: ${PROXY_RANKING_SEGMENT_OVERRIDES_ENABLED:true}
      rules:
        # RU/Windows hard excludes (likely_worked = 0% on 9–16 shows)
        - { country: RU, os: Windows, proxy-id: 678,  multiplier: 0.0 }
        - { country: RU, os: Windows, proxy-id: 776,  multiplier: 0.0 }
        - { country: RU, os: Windows, proxy-id: 883,  multiplier: 0.0 }
        - { country: RU, os: Windows, proxy-id: 1033, multiplier: 0.0 }
        # RU/Windows demotes (likely_worked 13–16%, large sample)
        - { country: RU, os: Windows, proxy-id: 688,  multiplier: 0.3 }
        - { country: RU, os: Windows, proxy-id: 879,  multiplier: 0.3 }
    segment-scoring:
      enabled: ${PROXY_RANKING_SEGMENT_SCORING_ENABLED:true}
      # When true: Thompson sampling (Beta distribution) replaces Wilson score.
      # Unknown proxies get Beta(1,1)=Uniform — full exploration, no manual tuning.
      # When false: deterministic Wilson 95% CI lower bound (Phase 2/3 behaviour).
      use-thompson-sampling: ${PROXY_RANKING_SEGMENT_SCORING_THOMPSON:false}
      min-sample-size: ${PROXY_RANKING_SEGMENT_SCORING_MIN_SAMPLE_SIZE:10}
      unknown-proxy-multiplier: ${PROXY_RANKING_SEGMENT_SCORING_UNKNOWN_MULTIPLIER:1.0}
      # Integer weights for composite score: worked and likely_worked count toward success,
      # failed and next_clicked count toward failure in the Wilson score calculation.
      worked-weight: ${PROXY_RANKING_SEGMENT_SCORING_WORKED_WEIGHT:2}
      likely-worked-weight: ${PROXY_RANKING_SEGMENT_SCORING_LIKELY_WORKED_WEIGHT:3}
      failed-weight: ${PROXY_RANKING_SEGMENT_SCORING_FAILED_WEIGHT:2}
      next-clicked-weight: ${PROXY_RANKING_SEGMENT_SCORING_NEXT_CLICKED_WEIGHT:1}
    session-aggregation:
      enabled: ${PROXY_RANKING_SESSION_AGGREGATION_ENABLED:true}
      session-timeout-minutes: ${PROXY_RANKING_SESSION_AGGREGATION_TIMEOUT_MINUTES:15}
    unrecoverable-session:
      enabled: ${PROXY_RANKING_UNRECOVERABLE_SESSION_ENABLED:true}
      failure-threshold: ${PROXY_RANKING_UNRECOVERABLE_SESSION_FAILURE_THRESHOLD:3}
    decision-logging:
      enabled: ${PROXY_RANKING_DECISION_LOGGING_ENABLED:true}

  sources:
    entries:
      - name: solispirit
        url: https://raw.githubusercontent.com/SoliSpirit/mtproto/master/all_proxies.txt
        format: TELEGRAM_TEXT
        enabled: true
      - name: free_proxy_db_text
        url: https://raw.githubusercontent.com/LoneKingCode/free-proxy-db/main/proxies/mtproto.txt
        format: TELEGRAM_TEXT
        enabled: true
      - name: free_proxy_db_json
        url: https://raw.githubusercontent.com/LoneKingCode/free-proxy-db/main/proxies/mtproto.json
        format: JSON_CONNECT_STRING
        enabled: true
      - name: aliilapro_text
        url: https://raw.githubusercontent.com/ALIILAPRO/MTProtoProxy/main/mtproto.txt
        format: TELEGRAM_TEXT
        enabled: true

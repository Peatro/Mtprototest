databaseChangeLog:
  - changeSet:
      id: 005-create-proxy-feedback
      author: codex
      changes:
        - createTable:
            tableName: proxy_feedback
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: proxy_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: result
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: platform
                  type: VARCHAR(50)
                  defaultValue: UNKNOWN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: proxy_feedback
            baseColumnNames: proxy_id
            referencedTableName: proxies
            referencedColumnNames: id
            constraintName: fk_proxy_feedback_proxy_id
            onDelete: CASCADE
